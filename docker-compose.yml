services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: data-analytics-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    container_name: data-analytics-frontend
    environment:
      - API_BASE_INTERNAL=http://backend:8000
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
