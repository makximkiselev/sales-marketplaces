services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: data-analytics-backend
    env_file:
      - .env
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-18000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    container_name: data-analytics-frontend
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-/api}
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-13000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
